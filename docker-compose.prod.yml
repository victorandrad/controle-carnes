services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: controle_carnes
      POSTGRES_USER: controle_carnes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U controle_carnes']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://controle_carnes:${POSTGRES_PASSWORD}@postgres:5432/controle_carnes
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      CORS_ORIGIN: https://gestaocampanha.victorandra.de
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - default
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.controle-carnes.rule=Host(`gestaocampanha.victorandra.de`)"
      - "traefik.http.routers.controle-carnes.entrypoints=websecure"
      - "traefik.http.routers.controle-carnes.tls.certresolver=letsencrypt"
      - "traefik.http.services.controle-carnes.loadbalancer.server.port=80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  traefik-proxy:
    external: true

volumes:
  postgres_data:
