<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#1890ff"/>
  <!-- ticket shape left notch -->
  <circle cx="0" cy="32" r="8" fill="white"/>
  <!-- ticket shape right notch -->
  <circle cx="64" cy="32" r="8" fill="white"/>
  <!-- dashed divider -->
  <line x1="10" y1="32" x2="54" y2="32" stroke="white" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.5"/>
  <!-- top number -->
  <text x="32" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="13" fill="white" letter-spacing="2">000</text>
  <!-- bottom label -->
  <text x="32" y="44" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="8.5" fill="white" opacity="0.9" letter-spacing="0.5">CARNÊ</text>
</svg>
